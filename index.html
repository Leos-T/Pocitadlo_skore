<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Stadion Skóre</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
  <button class="btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  <h1>Stadion Skóre</h1>
  <button class="reset" onclick="resetAll()">RESET</button>
</div>

<div class="stadium">

  <div class="team team-a">
    <div class="controls">
      <button class="plus btn-large" onclick="changeScore('A', 1)">+</button>
      <button class="minus" onclick="changeScore('A', -1)">-</button>
    </div>
    <div class="team-content">
      <input type="text" id="teamAName" placeholder="Tým A" autocomplete="off" onkeydown="handleEnter(event)">
      <div class="score" id="scoreA">0</div>
    </div>
  </div>

  <div class="timer">
    <input type="text" inputmode="numeric" id="minutesInput" placeholder="Minuty" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '');" onkeydown="handleEnter(event)">
    <div id="timeDisplay">00:00</div>
    <div class="timer-controls">
      <button class="plus" onclick="startTimer()">Start</button>
      <button class="minus" onclick="pauseTimer()">Pause</button>
    </div>
  </div>

  <div class="team team-b">
    <div class="team-content">
      <input type="text" id="teamBName" placeholder="Tým B" autocomplete="off" onkeydown="handleEnter(event)">
      <div class="score" id="scoreB">0</div>
    </div>
    <div class="controls">
      <button class="plus btn-large" onclick="changeScore('B', 1)">+</button>
      <button class="minus" onclick="changeScore('B', -1)">-</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
